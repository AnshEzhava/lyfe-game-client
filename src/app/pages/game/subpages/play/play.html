<div class="play-container">
  <header class="play-header">
    <div class="logo">LyfeGame</div>
    <div class="status-bar">
      <div class="status-item user-info">
        <img src="/images/user.png" alt="User Avatar" class="icon-avatar" />
        <span class="username">{{ user()?.username || 'Player' }}</span>
      </div>

      <div class="status-item date-info">
        <span>{{ currentDate() }}</span>
      </div>

      <div class="status-item time-info">
        <img
          [src]="isNight() ? '/images/moon.png' : '/images/sun.png'"
          alt="Weather"
          class="icon-weather"
        />
        <span>{{ currentTime() }}</span>
      </div>

      <div class="status-item currency-info">
        <span>Branks</span>
        <img src="/images/branks.png" alt="Branks" class="icon-currency" />
        <span class="amount">: {{ branks() }}</span>
      </div>
    </div>
  </header>

  <div class="play-grid">
    <!-- Stock Market -->
    <div
      class="grid-item stock-market"
      [class.invisible-placeholder]="expandedSection() === 'stock'"
      [style.view-transition-name]="expandedSection() === 'stock' ? 'none' : 'stock'"
      (click)="expand('stock')"
    >
      <h3 [style.view-transition-name]="expandedSection() === 'stock' ? 'none' : 'title-stock'">
        Stock Market
      </h3>
    </div>

    <div class="grid-column middle-column">
      <!-- Intelligence (formerly User Stats), Non-expandable -->
      <div class="grid-item user-stats">
        <h3 style="margin-bottom: 0">Intelligence</h3>

        <div class="stats-container">
          <div class="stat-row">
            <div class="stat-icon">
              <!-- Brain SVG Icon -->
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path
                  d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"
                />
              </svg>
            </div>
            <div class="progress-bar">
              <div class="progress-fill fill-intelligence" [style.width.%]="intelligence()"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Job / Education -->
      <div
        class="grid-item job-education"
        [class.invisible-placeholder]="expandedSection() === 'job'"
        [style.view-transition-name]="expandedSection() === 'job' ? 'none' : 'job'"
        (click)="expand('job')"
      >
        <h3 [style.view-transition-name]="expandedSection() === 'job' ? 'none' : 'title-job'">
          Job / Education
        </h3>
      </div>

      <!-- Leaderboards -->
      <div
        class="grid-item leaderboards"
        [class.invisible-placeholder]="expandedSection() === 'leaderboards'"
        [style.view-transition-name]="
          expandedSection() === 'leaderboards' ? 'none' : 'leaderboards'
        "
        (click)="expand('leaderboards')"
      >
        <h3
          [style.view-transition-name]="
            expandedSection() === 'leaderboards' ? 'none' : 'title-leaderboards'
          "
        >
          Leaderboards
        </h3>
      </div>
    </div>

    <!-- News -->
    <div
      class="grid-item news"
      [class.invisible-placeholder]="expandedSection() === 'news'"
      [style.view-transition-name]="expandedSection() === 'news' ? 'none' : 'news'"
      (click)="expand('news')"
    >
      <h3 [style.view-transition-name]="expandedSection() === 'news' ? 'none' : 'title-news'">
        News
      </h3>
    </div>

    <!-- Overlay for Expanded Item -->
    <div
      class="expanded-overlay"
      *ngIf="expandedSection()"
      [style.view-transition-name]="expandedSection()"
    >
      <button class="close-btn" (click)="close($event)">X</button>

      <div *ngIf="expandedSection() === 'stock'">
        <h3 style="view-transition-name: title-stock">Stock Market 1</h3>
      </div>

      <!-- No expanded view for User Stats/Intelligence anymore -->

      <div *ngIf="expandedSection() === 'job'">
        <h3 style="view-transition-name: title-job">Job / Education 1</h3>
      </div>
      <div *ngIf="expandedSection() === 'leaderboards'">
        <h3 style="view-transition-name: title-leaderboards">Leaderboards 1</h3>
      </div>
      <div *ngIf="expandedSection() === 'news'">
        <h3 style="view-transition-name: title-news">News 1</h3>
      </div>
    </div>
  </div>
  <app-modal title="Welcome!" [isOpen]="showModal()" (submitName)="onModalSubmit($event)">
  </app-modal>
</div>
